<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>E-Ink Weather Display Mockup v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');

  body {
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'IBM Plex Mono', monospace;
  }

  .device-frame {
    background: #1a1a1a;
    border-radius: 18px;
    padding: 28px 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .device-label {
    color: #555;
    font-size: 10px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .eink-screen {
    width: 800px;
    height: 480px;
    display: flex;
    flex-direction: column;
    background: #e8e4d9;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.008) 2px, rgba(0,0,0,0.008) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.005) 2px, rgba(0,0,0,0.005) 4px);
    color: #111;
    position: relative;
    overflow: hidden;
    border: 1px solid #999;
  }

  .eink-screen::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(155deg, rgba(255,255,255,0.06) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.03) 100%);
    pointer-events: none;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 16px;
    border-bottom: 2px solid #111;
    font-size: 14px;
    color: #111;
    height: 30px;
    box-sizing: border-box;
  }

  .battery-icon {
    display: inline-block;
    width: 28px;
    height: 14px;
    border: 2px solid #111;
    position: relative;
  }

  .battery-icon::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 7px;
    background: #111;
  }

  .battery-icon .fill {
    position: absolute;
    left: 2px; top: 2px; bottom: 2px;
    width: 65%;
    background: #111;
  }

  /* Weather section */
  .top-section {
    display: flex;
    align-items: center;
    border-bottom: 3px solid #111;
    height: 135px;
    box-sizing: border-box;
  }

  .weather-left {
    display: flex;
    align-items: center;
    flex: 1;
    padding: 10px 20px;
    gap: 16px;
  }

  .weather-icon svg {
    width: 90px;
    height: 90px;
  }

  .temp-group {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .temp-main {
    display: flex;
    flex-direction: column;
  }

  .temp-value {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .temp-value .number {
    font-size: 56px;
    font-weight: 700;
    line-height: 1;
    color: #000;
  }

  .temp-value .unit {
    font-size: 24px;
    font-weight: 400;
    color: #000;
  }

  .temp-desc {
    font-size: 20px;
    color: #333;
    margin-top: 4px;
  }

  .temp-minmax {
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-size: 16px;
    color: #333;
    gap: 4px;
    padding-top: 4px;
  }

  .divider {
    width: 2px;
    background: #111;
    align-self: stretch;
    margin: 12px 0;
  }

  .info-right {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10px 24px;
    gap: 12px;
    flex: 0 0 auto;
  }

  .info-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 600;
    color: #111;
  }

  .info-row svg {
    width: 32px;
    height: 32px;
  }

  .bottom-section {
    padding: 14px 30px 10px;
    flex: 1;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  .chart-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #000;
  }

  .chart-area {
    position: relative;
    flex: 1;
    margin: 0 42px 0 40px;
    border-left: 2px solid #111;
    border-bottom: 2px solid #111;
  }

  .y-label {
    position: absolute;
    left: -32px;
    font-size: 15px;
    font-weight: 700;
    color: #000;
  }

  .chart-area svg {
    width: 100%;
    height: 100%;
  }

  .x-labels {
    display: flex;
    justify-content: space-around;
    margin: 8px 42px 0 40px;
  }

  .day-label {
    text-align: center;
  }

  .day-label.past {
    color: #999;
  }

  .day-label.current {
    color: #000;
    font-weight: 700;
  }

  .day-label.future {
    color: #000;
  }

  .day-name {
    font-size: 11px;
    font-weight: 600;
  }

  .day-temps {
    margin-top: 2px;
    white-space: nowrap;
  }

  .t-min, .t-max {
    font-size: 10px;
  }

  .t-avg {
    font-size: 15px;
    font-weight: 700;
    margin: 0 1px;
  }

  .day-date {
    font-size: 9px;
    margin-top: 1px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="device-frame">
  <div class="device-label">Waveshare 7.5" e-Paper &mdash; 800×480</div>
  <div class="eink-screen">

    <!-- === STATUS BAR === -->
    <div class="status-bar">
      <span>Up since: 2450 days</span>
      <div class="battery-icon"><div class="fill"></div></div>
    </div>

    <!-- === TOP: Current Weather === -->
    <div class="top-section">
      <div class="weather-left">
        <div class="weather-icon">
          <svg viewBox="0 0 100 100" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round">
            <circle cx="50" cy="50" r="16"/>
            <line x1="50" y1="12" x2="50" y2="24"/>
            <line x1="50" y1="76" x2="50" y2="88"/>
            <line x1="12" y1="50" x2="24" y2="50"/>
            <line x1="76" y1="50" x2="88" y2="50"/>
            <line x1="22" y1="22" x2="31" y2="31"/>
            <line x1="69" y1="69" x2="78" y2="78"/>
            <line x1="78" y1="22" x2="69" y2="31"/>
            <line x1="31" y1="69" x2="22" y2="78"/>
          </svg>
        </div>

        <div class="temp-group">
          <div class="temp-main">
            <div class="temp-value">
              <span class="number">23</span>
              <span class="unit">°C</span>
            </div>
            <div class="temp-desc">Sonnig</div>
          </div>
          <div class="temp-minmax">
            <span>31°C</span>
            <span>10°C</span>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="info-right">
        <!-- Wind icon -->
        <div class="info-row">
          <svg viewBox="0 0 80 80" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round">
            <path d="M10,32 L45,32 Q55,32 55,24 Q55,16 45,16 Q40,16 40,22"/>
            <path d="M10,46 L55,46 Q65,46 65,38 Q65,30 55,30"/>
            <path d="M10,60 L40,60 Q50,60 50,52 Q50,44 40,44 Q36,44 36,48"/>
          </svg>
          <span>12 km/h | NW</span>
        </div>
        <!-- Rain icon -->
        <div class="info-row">
          <svg viewBox="0 0 80 80" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round">
            <path d="M20,40 Q20,28 32,28 Q35,20 45,20 Q57,20 57,32 Q65,32 65,40 Q65,48 57,48 L27,48 Q20,48 20,40 Z" fill="#000" stroke="none"/>
            <line x1="28" y1="54" x2="25" y2="64"/>
            <line x1="42" y1="54" x2="39" y2="64"/>
            <line x1="56" y1="54" x2="53" y2="64"/>
          </svg>
          <span>10 %</span>
        </div>
      </div>
    </div>

    <!-- === BOTTOM: Weekly Trend Chart === -->
    <div class="bottom-section">
      <div class="chart-area">
        <div class="y-label" style="top:-4px;">25°</div>
        <div class="y-label" style="top:calc(50% - 6px);">15°</div>
        <div class="y-label" style="bottom:-4px;">5°</div>

        <svg width="100%" height="100%" viewBox="0 0 700 200">
          <!-- Grid lines -->
          <line x1="0" y1="0" x2="700" y2="0" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,4"/>
          <line x1="0" y1="100" x2="700" y2="100" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,4"/>
          <line x1="0" y1="200" x2="700" y2="200" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4,4"/>

          <!-- Past days (gray): Mo → Di → Mi → (transition to Do) -->
          <polyline points="50,140 150,120 250,100 350,50" fill="none" stroke="#aaa" stroke-width="2.5"/>
          <circle cx="50" cy="140" r="8" fill="#aaa"/>
          <circle cx="150" cy="120" r="8" fill="#aaa"/>
          <circle cx="250" cy="100" r="8" fill="#aaa"/>

          <!-- Current + future (black): Do → Fr → Sa → So -->
          <polyline points="350,50 450,80 550,70 650,90" fill="none" stroke="#000" stroke-width="3"/>
          <circle cx="350" cy="50" r="9" fill="#000"/>
          <circle cx="450" cy="80" r="8" fill="#000"/>
          <circle cx="550" cy="70" r="8" fill="#000"/>
          <circle cx="650" cy="90" r="8" fill="#000"/>

          <!-- Weather icons above data points -->
          <!-- Mo: cloudy (gray) -->
          <g transform="translate(38,105)" fill="none" stroke="#aaa" stroke-width="1.5">
            <path d="M5,12 a7,7 0 0,1 14,0" fill="#aaa" stroke="none"/>
            <circle cx="12" cy="7" r="5"/>
          </g>

          <!-- Di: rain (gray) -->
          <g transform="translate(138,85)" fill="none" stroke="#aaa" stroke-width="1.5">
            <path d="M5,8 a7,7 0 0,1 14,0" fill="#aaa" stroke="none"/>
            <line x1="7" y1="13" x2="6" y2="17"/>
            <line x1="12" y1="13" x2="11" y2="17"/>
            <line x1="17" y1="13" x2="16" y2="17"/>
          </g>

          <!-- Mi: partly cloudy (gray) -->
          <g transform="translate(238,65)" fill="none" stroke="#aaa" stroke-width="1.5">
            <circle cx="8" cy="6" r="5"/>
            <line x1="8" y1="0" x2="8" y2="2"/>
            <line x1="14" y1="6" x2="12" y2="6"/>
            <line x1="2" y1="6" x2="4" y2="6"/>
            <path d="M8,12 a6,6 0 0,1 12,0" fill="#aaa" stroke="none"/>
          </g>

          <!-- Do: sun (black, today) -->
          <g transform="translate(338,15)" fill="none" stroke="#000" stroke-width="1.5">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="2" x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="5" y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
            <line x1="5" y1="5" x2="7" y2="7"/>
            <line x1="17" y1="17" x2="19" y2="19"/>
            <line x1="19" y1="5" x2="17" y2="7"/>
            <line x1="7" y1="17" x2="5" y2="19"/>
          </g>

          <!-- Fr: partly cloudy (black) -->
          <g transform="translate(438,45)" fill="none" stroke="#000" stroke-width="1.5">
            <circle cx="8" cy="6" r="5"/>
            <line x1="8" y1="0" x2="8" y2="2"/>
            <line x1="14" y1="6" x2="12" y2="6"/>
            <line x1="2" y1="6" x2="4" y2="6"/>
            <path d="M8,12 a6,6 0 0,1 12,0" fill="#000" stroke="none"/>
          </g>

          <!-- Sa: cloudy (black) -->
          <g transform="translate(538,35)" fill="none" stroke="#000" stroke-width="1.5">
            <path d="M5,12 a7,7 0 0,1 14,0" fill="#000" stroke="none"/>
            <circle cx="12" cy="7" r="5"/>
          </g>

          <!-- So: rain (black) -->
          <g transform="translate(638,55)" fill="none" stroke="#000" stroke-width="1.5">
            <path d="M5,8 a7,7 0 0,1 14,0" fill="#000" stroke="none"/>
            <line x1="7" y1="13" x2="6" y2="17"/>
            <line x1="12" y1="13" x2="11" y2="17"/>
            <line x1="17" y1="13" x2="16" y2="17"/>
          </g>
        </svg>
      </div>

      <!-- X-axis: Day labels with Min/Avg/Max -->
      <div class="x-labels">
        <div class="day-label past">
          <div class="day-name">Mo</div>
          <div class="day-temps"><span class="t-min">5°</span> <span class="t-avg">12°</span> <span class="t-max">18°</span></div>
          <div class="day-date">14.04</div>
        </div>
        <div class="day-label past">
          <div class="day-name">Di</div>
          <div class="day-temps"><span class="t-min">7°</span> <span class="t-avg">14°</span> <span class="t-max">20°</span></div>
          <div class="day-date">15.04</div>
        </div>
        <div class="day-label past">
          <div class="day-name">Mi</div>
          <div class="day-temps"><span class="t-min">8°</span> <span class="t-avg">16°</span> <span class="t-max">22°</span></div>
          <div class="day-date">16.04</div>
        </div>
        <div class="day-label current">
          <div class="day-name">Do</div>
          <div class="day-temps"><span class="t-min">10°</span> <span class="t-avg">19°</span> <span class="t-max">25°</span></div>
          <div class="day-date">17.04</div>
        </div>
        <div class="day-label future">
          <div class="day-name">Fr</div>
          <div class="day-temps"><span class="t-min">9°</span> <span class="t-avg">17°</span> <span class="t-max">23°</span></div>
          <div class="day-date">18.04</div>
        </div>
        <div class="day-label future">
          <div class="day-name">Sa</div>
          <div class="day-temps"><span class="t-min">8°</span> <span class="t-avg">18°</span> <span class="t-max">24°</span></div>
          <div class="day-date">19.04</div>
        </div>
        <div class="day-label future">
          <div class="day-name">So</div>
          <div class="day-temps"><span class="t-min">7°</span> <span class="t-avg">16°</span> <span class="t-max">21°</span></div>
          <div class="day-date">20.04</div>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
